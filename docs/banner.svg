<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" fill="none" role="img" aria-label="CTG Terminal banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#0d1320"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4aa8ff"/>
      <stop offset="0.5" stop-color="#ffb000"/>
      <stop offset="1" stop-color="#1ec98b"/>
    </linearGradient>
    <style>
      .mono { font-family: 'SF Mono','Roboto Mono',ui-monospace,Menlo,monospace; }
      .tick { animation: rise 2.6s ease-in-out infinite; }
      .tick2 { animation: rise 2.6s ease-in-out infinite; animation-delay: .4s; }
      .tick3 { animation: rise 2.6s ease-in-out infinite; animation-delay: .8s; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; }
      @keyframes rise { 0%,100% { transform: translateY(6px); opacity:.5 } 50% { transform: translateY(-6px); opacity:1 } }
      @keyframes pulse { 0%,100% { opacity:.35 } 50% { opacity:1 } }
      @keyframes dash { to { stroke-dashoffset: 0 } }
      .line { stroke-dasharray: 1600; stroke-dashoffset: 1600; animation: dash 3s ease-out forwards; }
    </style>
  </defs>

  <rect width="1280" height="320" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="318" rx="17" fill="none" stroke="#1e2838"/>

  <!-- candlesticks / ticker motif -->
  <g transform="translate(60,90)" opacity="0.9">
    <g class="tick"><rect x="0" y="40" width="10" height="70" fill="#1ec98b"/><rect x="3" y="20" width="4" height="120" fill="#1ec98b"/></g>
    <g class="tick2"><rect x="26" y="60" width="10" height="60" fill="#ff5c6c"/><rect x="29" y="44" width="4" height="96" fill="#ff5c6c"/></g>
    <g class="tick3"><rect x="52" y="30" width="10" height="80" fill="#1ec98b"/><rect x="55" y="14" width="4" height="120" fill="#1ec98b"/></g>
    <g class="tick"><rect x="78" y="50" width="10" height="64" fill="#ffb000"/><rect x="81" y="34" width="4" height="100" fill="#ffb000"/></g>
  </g>

  <!-- payoff curve motif -->
  <polyline class="line" points="1000,210 1060,210 1110,150 1170,90 1210,90"
            fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="990" y1="160" x2="1220" y2="160" stroke="#26344a" stroke-width="1"/>

  <!-- diamond logo -->
  <text x="220" y="150" class="mono" font-size="60" fill="#ffb000">◆</text>

  <!-- title -->
  <text x="280" y="150" class="mono" font-size="62" font-weight="700" fill="#d7e0ee" letter-spacing="2">CTG Terminal</text>
  <text x="282" y="196" class="mono" font-size="21" fill="#7d8aa0" letter-spacing="3">AUTONOMOUS  ALPHA  DISCOVERY  SYSTEM</text>

  <!-- tagline chips -->
  <g class="mono" font-size="15">
    <g transform="translate(282,232)">
      <rect width="206" height="30" rx="6" fill="#111722" stroke="#1e2838"/>
      <text x="14" y="20" fill="#4aa8ff">real-time market data</text>
    </g>
    <g transform="translate(500,232)">
      <rect width="232" height="30" rx="6" fill="#111722" stroke="#1e2838"/>
      <text x="14" y="20" fill="#1ec98b">multi-agent LLM research</text>
    </g>
    <g transform="translate(744,232)">
      <rect width="232" height="30" rx="6" fill="#111722" stroke="#1e2838"/>
      <text x="14" y="20" fill="#ffb000">quant risk &amp; options engine</text>
    </g>
  </g>

  <circle cx="1180" cy="56" r="6" fill="#1ec98b" class="pulse"/>
  <text x="1196" y="61" class="mono" font-size="14" fill="#7d8aa0">LIVE</text>
</svg>
